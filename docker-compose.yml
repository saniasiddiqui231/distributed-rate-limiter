services:

  redis:
    image: redis:7

    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    ports:
      - "8081:8081"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway

    ports:
      - "8080:8080"

    environment:
      REDIS_ADDR: redis:6379
      BACKEND_URL: http://backend:8081

    depends_on:
      - redis
      - backend

  prometheus:
    image: prom/prometheus

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    depends_on:
      - gateway

  grafana:
    image: grafana/grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus